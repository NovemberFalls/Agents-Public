name: Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Scan full history
        run: gitleaks detect --source . --redact -v --exit-code 1
